name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Seed Demo Data
        run: npm run seed

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Install Playwright Browser
        run: npx playwright install chromium

      - name: E2E Smoke Test
        run: npm run test:e2e
