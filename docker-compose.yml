services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: buildintel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
    environment:
      PORT: 4000
      CLIENT_ORIGIN: http://localhost:4000
      JWT_SECRET: change-this-in-staging
      DEMO_MODE: "false"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/buildintel
      MAX_UPLOAD_BYTES: 1048576
    ports:
      - "4000:4000"
    command: sh -c "npm run migrate --workspace server && npm run start --workspace server"

volumes:
  postgres-data:
